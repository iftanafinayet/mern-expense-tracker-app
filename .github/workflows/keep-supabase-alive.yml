name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 0 */3 * *' # Menjalankan setiap 3 hari sekali pada tengah malam
  workflow_dispatch: # Memungkinkan untuk dijalankan secara manual dari tab Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          curl -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/transactions?select=*&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
